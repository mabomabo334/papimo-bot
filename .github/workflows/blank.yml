name: papimo-run

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Python setup
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install
      run: pip install selenium gspread google-auth

    - name: Run
      run: python main.py
